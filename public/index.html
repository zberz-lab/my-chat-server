<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>카카오톡 스타일 오픈채팅</title>
    <style>
        /* 간단한 카카오톡 느낌의 디자인 스타일링 */
        body { font-family: sans-serif; background-color: #b2c7da; margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; }
        #login-container { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #fef01b; }
        #chat-container { display: none; flex-direction: column; height: 100vh; }
        #messages { flex: 1; overflow-y: auto; padding: 20px; list-style-type: none; margin: 0; }
        #messages li { margin-bottom: 15px; padding: 10px; border-radius: 5px; max-width: 70%; word-break: break-all; }
        .my-msg { background-color: #fef01b; align-self: flex-end; margin-left: auto; }
        .other-msg { background-color: #ffffff; align-self: flex-start; }
        .system-msg { background-color: rgba(0,0,0,0.1); color: #fff; align-self: center; text-align: center; max-width: 100% !important; margin: 10px auto; font-size: 12px; }
        #form { display: flex; padding: 10px; background: #fff; }
        #input { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 5px; outline: none; }
        #form button { padding: 10px 20px; background: #fef01b; border: none; margin-left: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-container">
        <h2>카카오 오픈채팅 오픈!</h2>
        <input type="text" id="username" placeholder="닉네임 입력" style="padding:10px; margin:5px; width:200px;"><br>
        <input type="text" id="room" placeholder="방 이름 입력 (예: 코딩방)" style="padding:10px; margin:5px; width:200px;"><br>
        <button id="join-btn" style="padding:10px 20px; background:#3a1d1d; color:#fff; border:none; cursor:pointer;">입장하기</button>
    </div>

    <div id="chat-container">
        <div style="background:#3a1d1d; color:#fff; padding:15px; text-align:center; font-weight:bold;" id="room-title">방 제목</div>
        <ul id="messages"></ul>
        <form id="form" action="">
            <input id="input" autocomplete="off" placeholder="메시지를 입력하세요..." />
            <button>전송</button>
        </form>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io('https://my-chat-app-hsn0.onrender.com');

        const loginContainer = document.getElementById('login-container');
        const chatContainer = document.getElementById('chat-container');
        const joinBtn = document.getElementById('join-btn');
        const form = document.getElementById('form');
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');
        const roomTitle = document.getElementById('room-title');

        let myName = "";

        // 입장 버튼 클릭 시
        joinBtn.addEventListener('click', () => {
            const username = document.getElementById('username').value.trim();
            const room = document.getElementById('room').value.trim();

            if (!username || !room) {
                alert('닉네임과 방 이름을 모두 입력해주세요!');
                return;
            }

            myName = username;
            roomTitle.innerText = `${room} 오픈채팅방`;

            // 서버에 입장 알림
            socket.emit('join room', { room, username });

            // 화면 전환
            loginContainer.style.display = 'none';
            chatContainer.style.display = 'flex';
        });

        // 메시지 전송 버튼 클릭 시
        form.addEventListener('submit', (e) => {
            e.preventDefault();
            if (input.value.trim()) {
                // 서버로 메시지 보냄
                socket.emit('chat message', input.value);
                input.value = '';
            }
        });

       // index.html의 <script> 태그 내부 핵심 로직 교체용

// 기존 'chat message' 이벤트를 아래 내용으로 덮어쓰기 하세요.
socket.on('chat message', (data) => {
    const item = document.createElement('li');
    item.setAttribute('id', data.id); // 메시지 고유 ID 부여
    
    // 메시지 텍스트와 숫자를 감싸는 구조
    const msgText = document.createElement('span');
    const badge = document.createElement('span');
    badge.classList.add('badge');
    badge.style.color = 'red';
    badge.style.fontSize = '10px';
    badge.style.marginLeft = '5px';
    badge.style.marginRight = '5px';
    
    if (data.unreadCount > 0) {
        badge.innerText = data.unreadCount;
    }

    if (data.username === '시스템') {
        item.classList.add('system-msg');
        item.textContent = data.message;
    } else if (data.username === myName) {
        item.classList.add('my-msg');
        msgText.textContent = `나: ${data.message}`;
        item.appendChild(badge); // 나는 숫자 왼쪽에
        item.appendChild(msgText);
    } else {
        item.classList.add('other-msg');
        msgText.textContent = `${data.username}: ${data.message}`;
        item.appendChild(msgText);
        item.appendChild(badge); // 상대방은 숫자 오른쪽에
        
        // 상대방 메시지를 받았으니 내가 읽었다고 서버에 신호 전송
        if (data.unreadCount > 0) {
            socket.emit('read message', data.id);
        }
    }

    messages.appendChild(item);
    messages.scrollTop = messages.scrollHeight;
});

// 실시간으로 숫자 1을 지워주는 이벤트 추가
socket.on('msg read updated', (data) => {
    const msgLi = document.getElementById(data.id);
    if (msgLi) {
        const badge = msgLi.querySelector('.badge');
        if (badge && data.unreadCount === 0) {
            badge.remove(); // 숫자 1 삭제!
        }
    }
});

// 방에 늦게 들어왔을 때 기존 기록을 싹 다시 그려주는 이벤트 추가
socket.on('update history', (history) => {
    messages.innerHTML = ''; // 기존 화면 비우기
    history.forEach(data => {
        // 위의 새 대화 그리기 로직과 동일하게 반복 호출하여 화면을 복구합니다.
        // (이해를 돕기 위해 축약함, 실제 구현 시 위 그리기 로직을 함수로 만들면 편리합니다.)
    });
});
